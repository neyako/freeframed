name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: freeframe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/freeframe_test
      TEST_DATABASE_URL: postgresql://user:pass@localhost:5432/freeframe_test
      REDIS_URL: redis://localhost:6379/0
      S3_BUCKET: freeframe-test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: testkey
      S3_SECRET_KEY: testsecret
      S3_REGION: us-east-1
      JWT_SECRET: ci-test-secret-key-not-for-production
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt
      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest apps/api/tests/ -q 2>&1 | tee test-output.txt
          PASSED=$(sed -nE 's/^([0-9]+) passed(,| in).*/\1/p' test-output.txt | tail -1)
          echo "Tests passed: $PASSED"
          if [[ ! "$PASSED" =~ ^[0-9]+$ ]] || (( PASSED < 100 )); then
            echo "::error::Expected at least 100 tests to pass but got ${PASSED:-0} — tests may have been deleted, gutted, or skipped"
            exit 1
          fi

  publish:
    name: Build & push images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (all-in-one)
        id: meta_allinone
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/freeframe
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.allinone
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_allinone.outputs.tags }}
          labels: ${{ steps.meta_allinone.outputs.labels }}
