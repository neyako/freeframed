<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 {
            color: #4F46E5;
            font-size: 24px;
            margin: 0;
        }
        h2 {
            color: #1a1a1a;
            font-size: 20px;
            margin: 0 0 16px 0;
        }
        p {
            margin: 0 0 16px 0;
            color: #555;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4F46E5;
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            margin: 16px 0;
        }
        .button:hover {
            background-color: #4338CA;
        }
        .code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #4F46E5;
            text-align: center;
            padding: 24px;
            background: #F5F3FF;
            border-radius: 8px;
            margin: 16px 0;
        }
        .quote {
            border-left: 3px solid #4F46E5;
            padding-left: 16px;
            margin: 16px 0;
            color: #555;
            font-style: italic;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 13px;
        }
        .muted {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>{{ workspace_name | default("FreeFrame") }}</h1>
            </div>
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>© {{ year }} {{ workspace_name | default("FreeFrame") }}. All rights reserved.</p>
            <p class="muted">
                You're receiving this email because you have an account on {{ workspace_name | default("FreeFrame") }}.
            </p>
        </div>
    </div>
</body>
</html>
